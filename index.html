<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スライドジェネレーター</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --border:#E2E6EA;
  --ink:#1A1F2E;
  --muted:#6B7280;
  --accent:#2563EB;
  --accent-light:#EFF6FF;
  --success:#059669;
  --danger:#DC2626;
  --radius:12px;
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px}
.badge{font-size:11px;font-weight:500;padding:3px 10px;background:var(--accent-light);color:var(--accent);border-radius:20px}

main{flex:1;max-width:860px;width:100%;margin:0 auto;padding:40px 24px 80px;display:flex;flex-direction:column;gap:24px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px 30px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card-label{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

.transcript-area{
  width:100%;min-height:200px;border:1px solid var(--border);border-radius:9px;
  padding:14px;font-size:14px;line-height:1.8;font-family:'Noto Sans JP',sans-serif;
  color:var(--ink);resize:vertical;outline:none;transition:border-color .15s;background:var(--bg);
}
.transcript-area:focus{border-color:var(--accent);background:white}
.transcript-area::placeholder{color:#B0B8C4}
.char-count{text-align:right;font-size:11px;color:var(--muted);margin-top:6px}

.options-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.option-group label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:5px}
.option-select{
  width:100%;height:40px;border:1px solid var(--border);border-radius:9px;
  padding:0 12px;font-size:13px;color:var(--ink);background:var(--bg);outline:none;cursor:pointer;
}

.generate-btn{
  width:100%;height:52px;background:var(--accent);color:white;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .15s;font-family:'Noto Sans JP',sans-serif;
}
.generate-btn:hover:not(:disabled){background:#1D4ED8}
.generate-btn:disabled{background:#93C5FD;cursor:not-allowed}

.status-box{display:none;border-radius:10px;padding:14px 18px;font-size:13px;align-items:center;gap:12px}
.status-box.show{display:flex}
.status-box.loading{background:var(--accent-light);color:var(--accent);border:1px solid #BFDBFE}
.status-box.success{background:#ECFDF5;color:var(--success);border:1px solid #6EE7B7}
.status-box.error{background:#FEF2F2;color:var(--danger);border:1px solid #FECACA}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

.progress-wrap{display:none;background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.progress-wrap.show{display:block}
.progress-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .5s ease;width:0%}

/* 結果カード */
.result-card{display:none;background:var(--surface);border:2px solid var(--success);border-radius:var(--radius);padding:28px 30px}
.result-card.show{display:block}
.result-title{font-size:14px;font-weight:700;color:var(--success);margin-bottom:16px;display:flex;align-items:center;gap:8px}

.result-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-open{
  flex:1;min-width:200px;height:52px;background:var(--success);color:white;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;transition:background .15s;font-family:'Noto Sans JP',sans-serif;
}
.btn-open:hover{background:#047857}
.btn-copy{
  height:52px;padding:0 20px;background:transparent;color:var(--accent);
  border:1px solid var(--accent);border-radius:10px;font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Noto Sans JP',sans-serif;
}
.btn-copy:hover{background:var(--accent-light)}

.result-note{
  margin-top:16px;padding:14px 16px;background:var(--bg);border-radius:8px;
  font-size:12px;color:var(--muted);line-height:1.8;
}
.result-note strong{color:var(--ink)}

footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    スライドジェネレーター
  </div>
  <span class="badge">Googleスライド連携</span>
</header>

<main>

  <div class="card">
    <div class="card-label">会議の文字起こし</div>
    <textarea class="transcript-area" id="transcript" oninput="updateCount()"
      placeholder="ここに会議の文字起こしを貼り付けてください。

例：
山田：今期の売上は前年比120%、特に関西エリアの伸びが顕著です。
佐藤：新規顧客獲得が主因で、製造業向けの提案が効いています。
山田：来期は関東にも同様のアプローチを展開したいと思います。
..."></textarea>
    <div class="char-count"><span id="charCount">0</span> 文字</div>

    <div class="options-row">
      <div class="option-group">
        <label>スライド枚数</label>
        <select class="option-select" id="slideCount">
          <option value="5">5枚（簡潔）</option>
          <option value="8" selected>8枚（標準）</option>
          <option value="12">12枚（詳細）</option>
        </select>
      </div>
      <div class="option-group">
        <label>資料のトーン</label>
        <select class="option-select" id="tone">
          <option value="business">ビジネス（標準）</option>
          <option value="formal">フォーマル（行政・報告）</option>
          <option value="casual">カジュアル（社内共有）</option>
        </select>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generate()">
    ✦ Googleスライドを自動生成する
  </button>

  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status-box" id="statusBox">
    <div class="spinner" id="spinner" style="display:none"></div>
    <div id="statusText"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-title">✓ スライドが生成されました</div>
    <div class="result-btns">
      <a class="btn-open" id="openBtn" href="#" target="_blank">
        📊 Googleスライドを開く
      </a>
      <button class="btn-copy" onclick="copyUrl()">URLをコピー</button>
    </div>
    <div class="result-note">
      <strong>編集・ダウンロード方法：</strong><br>
      「Googleスライドを開く」→ 自由に編集できます<br>
      PowerPointで保存：ファイル → ダウンロード → <strong>Microsoft PowerPoint (.pptx)</strong>
    </div>
  </div>

</main>

<footer>スライドジェネレーター — 文字起こし → Googleスライド 自動変換</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxUPOaL7nyMEsTkmV1NfkUjeFww1Gs8EAcsYwJ-2rcCD3cIXbeVaBWQDY4GHVMW62UxUQ/exec';

let resultUrl = '';

function updateCount(){
  document.getElementById('charCount').textContent =
    document.getElementById('transcript').value.length.toLocaleString();
}

function setProgress(p){
  const w=document.getElementById('progressWrap');
  const b=document.getElementById('progressBar');
  if(p===null){w.classList.remove('show');b.style.width='0%'}
  else{w.classList.add('show');b.style.width=p+'%'}
}

function setStatus(type, text, spin=false){
  const box=document.getElementById('statusBox');
  box.className='status-box show '+type;
  document.getElementById('spinner').style.display=spin?'block':'none';
  document.getElementById('statusText').innerHTML=text;
}

function clearStatus(){
  document.getElementById('statusBox').className='status-box';
}

async function generate(){
  const transcript = document.getElementById('transcript').value.trim();
  const slideCount = document.getElementById('slideCount').value;
  const tone = document.getElementById('tone').value;

  if(transcript.length < 50){
    setStatus('error','文字起こしを貼り付けてください（50文字以上）');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  document.getElementById('resultCard').className = 'result-card';
  clearStatus();
  setProgress(10);

  try{
    setProgress(20);
    setStatus('loading', 'Claude AIが文字起こしを分析中...', true);

    // プログレスを擬似的に進める
    let prog = 20;
    const timer = setInterval(()=>{
      prog = Math.min(prog + 3, 85);
      setProgress(prog);
    }, 1000);

    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ transcript, slideCount, tone }),
      headers: { 'Content-Type': 'text/plain' }
    });

    clearInterval(timer);

    const data = await res.json();

    if(!data.success){
      throw new Error(data.error || '生成に失敗しました');
    }

    setProgress(100);
    resultUrl = data.url;

    setTimeout(()=>{
      setProgress(null);
      clearStatus();
      document.getElementById('openBtn').href = resultUrl;
      document.getElementById('resultCard').className = 'result-card show';
    }, 400);

  }catch(err){
    setProgress(null);
    setStatus('error', 'エラーが発生しました：' + err.message);
    console.error(err);
  }finally{
    btn.disabled = false;
    btn.textContent = '✦ Googleスライドを自動生成する';
  }
}

function copyUrl(){
  if(!resultUrl) return;
  navigator.clipboard.writeText(resultUrl).then(()=>{
    const btn = event.target;
    btn.textContent = 'コピーしました！';
    setTimeout(()=>btn.textContent='URLをコピー', 2000);
  });
}
</script>
</body>
</html>
