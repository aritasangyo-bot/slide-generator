
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スライドジェネレーター</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --border: #E2E6EA;
    --ink: #1A1F2E;
    --muted: #6B7280;
    --accent: #2563EB;
    --accent-light: #EFF6FF;
    --success: #059669;
    --danger: #DC2626;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── ヘッダー ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; fill: white; }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* ── メインレイアウト ── */
  main {
    flex: 1;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── セクションカード ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    box-shadow: var(--shadow);
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── APIキー入力 ── */
  .api-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .api-input {
    flex: 1;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 14px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }
  .api-input:focus { border-color: var(--accent); background: white; }

  .toggle-btn {
    height: 44px;
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    transition: border-color .15s;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 文字起こしテキストエリア ── */
  .transcript-area {
    width: 100%;
    min-height: 220px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.75;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color .15s;
    background: var(--bg);
  }
  .transcript-area:focus { border-color: var(--accent); background: white; }
  .transcript-area::placeholder { color: #B0B8C4; }

  .char-count {
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── オプション行 ── */
  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }

  .option-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .option-select {
    width: 100%;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    cursor: pointer;
  }
  .option-select:focus { border-color: var(--accent); }

  /* ── 生成ボタン ── */
  .generate-btn {
    width: 100%;
    height: 52px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .15s, transform .1s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .generate-btn:hover:not(:disabled) { background: #1D4ED8; }
  .generate-btn:active:not(:disabled) { transform: scale(0.99); }
  .generate-btn:disabled { background: #93C5FD; cursor: not-allowed; }

  .btn-icon { font-size: 18px; }

  /* ── ステータス ── */
  .status-box {
    display: none;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 14px;
    align-items: flex-start;
    gap: 12px;
  }
  .status-box.show { display: flex; }
  .status-box.loading { background: var(--accent-light); color: var(--accent); }
  .status-box.success { background: #ECFDF5; color: var(--success); }
  .status-box.error { background: #FEF2F2; color: var(--danger); }

  .status-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .status-text { line-height: 1.6; }

  /* ── スピナー ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }

  /* ── プログレスバー ── */
  .progress-wrap {
    display: none;
    background: var(--border);
    border-radius: 99px;
    height: 4px;
    overflow: hidden;
  }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── ダウンロードボタン ── */
  .download-btn {
    display: none;
    width: 100%;
    height: 52px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .15s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .download-btn.show { display: flex; }
  .download-btn:hover { background: #047857; }

  /* ── スライドプレビュー ── */
  .preview-section { display: none; }
  .preview-section.show { display: block; }

  .preview-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .slide-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .slide-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .slide-num {
    width: 26px;
    height: 26px;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .slide-content .slide-heading {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .slide-content .slide-points {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* ── フッター ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    </div>
    スライドジェネレーター
  </div>
  <span class="badge">Powered by Claude AI</span>
</header>

<main>

  <!-- APIキー -->
  <div class="card">
    <div class="card-label">API設定</div>
    <div class="api-row">
      <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
      <button class="toggle-btn" onclick="toggleApiVisibility()">表示</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px;">
      APIキーはブラウザ内のみで使用し、外部には送信されません（Anthropic API除く）
    </div>
  </div>

  <!-- 文字起こし入力 -->
  <div class="card">
    <div class="card-label">会議の文字起こし</div>
    <textarea
      class="transcript-area"
      id="transcript"
      placeholder="ここに会議の文字起こしテキストを貼り付けてください。

例：
山田：今期の売上は前年比120%で、特に関西エリアの伸びが顕著です。
佐藤：要因としては新規顧客の獲得が大きく、特に製造業向けの提案が効いています。
山田：来期は関東エリアにも同様のアプローチを展開したいと思います。
..."
      oninput="updateCharCount()"
    ></textarea>
    <div class="char-count"><span id="charCount">0</span> 文字</div>

    <div class="options-row">
      <div class="option-group">
        <label>スライド枚数（目安）</label>
        <select class="option-select" id="slideCount">
          <option value="5">5枚（簡潔）</option>
          <option value="8" selected>8枚（標準）</option>
          <option value="12">12枚（詳細）</option>
        </select>
      </div>
      <div class="option-group">
        <label>資料のトーン</label>
        <select class="option-select" id="tone">
          <option value="business">ビジネス（標準）</option>
          <option value="formal">フォーマル（行政・報告）</option>
          <option value="casual">カジュアル（社内共有）</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="generate-btn" id="generateBtn" onclick="generateSlides()">
    <span class="btn-icon">✦</span>
    スライドを自動生成する
  </button>

  <!-- プログレス -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- ステータス -->
  <div class="status-box" id="statusBox">
    <div class="status-icon" id="statusIcon"></div>
    <div class="status-text" id="statusText"></div>
  </div>

  <!-- プレビュー -->
  <div class="preview-section" id="previewSection">
    <div class="card">
      <div class="preview-title">
        📋 生成されたスライド構成
      </div>
      <div class="slide-list" id="slideList"></div>
    </div>
  </div>

  <!-- ダウンロードボタン -->
  <button class="download-btn" id="downloadBtn" onclick="downloadPptx()">
    ⬇ PowerPointをダウンロード (.pptx)
  </button>

</main>

<footer>
  スライドジェネレーター — 文字起こし → PowerPoint 自動変換ツール
</footer>

<script>
// ─── グローバル変数 ───────────────────────────────
let generatedSlides = null;
let apiKeyVisible = false;

// ─── APIキー表示切替 ─────────────────────────────
function toggleApiVisibility() {
  const input = document.getElementById('apiKey');
  const btn = event.target;
  apiKeyVisible = !apiKeyVisible;
  input.type = apiKeyVisible ? 'text' : 'password';
  btn.textContent = apiKeyVisible ? '隠す' : '表示';
}

// ─── 文字数カウント ───────────────────────────────
function updateCharCount() {
  const len = document.getElementById('transcript').value.length;
  document.getElementById('charCount').textContent = len.toLocaleString();
}

// ─── ステータス表示 ───────────────────────────────
function setStatus(type, iconHtml, text) {
  const box = document.getElementById('statusBox');
  box.className = `status-box show ${type}`;
  document.getElementById('statusIcon').innerHTML = iconHtml;
  document.getElementById('statusText').innerHTML = text;
}

function clearStatus() {
  document.getElementById('statusBox').className = 'status-box';
}

// ─── プログレスバー ───────────────────────────────
function setProgress(pct) {
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  if (pct === null) {
    wrap.classList.remove('show');
    bar.style.width = '0%';
  } else {
    wrap.classList.add('show');
    bar.style.width = pct + '%';
  }
}

// ─── メイン：スライド生成 ────────────────────────
async function generateSlides() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const transcript = document.getElementById('transcript').value.trim();
  const slideCount = document.getElementById('slideCount').value;
  const tone = document.getElementById('tone').value;

  // バリデーション
  if (!apiKey) {
    setStatus('error', '⚠', 'Anthropic APIキーを入力してください。');
    return;
  }
  if (!transcript || transcript.length < 50) {
    setStatus('error', '⚠', '文字起こしテキストを貼り付けてください（50文字以上）。');
    return;
  }

  // UI初期化
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> AIが構成を考えています...';
  document.getElementById('downloadBtn').className = 'download-btn';
  document.getElementById('previewSection').className = 'preview-section';
  clearStatus();
  setProgress(10);

  const toneDesc = {
    business: 'ビジネス標準：簡潔・明確・プロフェッショナルなトーン',
    formal: 'フォーマル：行政・公式報告に適した丁寧なトーン',
    casual: 'カジュアル：社内共有向けのわかりやすいトーン'
  }[tone];

  const systemPrompt = `あなたはプロのプレゼンテーションデザイナーです。会議の文字起こしを分析し、要点を整理してスライド構成をJSONで出力します。

出力形式（必ずこのJSON形式のみを返す）:
{
  "title": "プレゼンテーションタイトル",
  "subtitle": "サブタイトルまたは日付・会議名",
  "slides": [
    {
      "type": "section",
      "layout": "bullets",
      "heading": "セクションタイトル",
      "points": ["ポイント1", "ポイント2", "ポイント3"],
      "note": "発表者向けメモ（任意）"
    }
  ]
}

typeは以下から選択:
- "title": タイトルスライド（最初の1枚のみ）
- "section": 通常コンテンツスライド
- "summary": まとめスライド（最後の1枚）

layoutは内容に応じて以下から最適なものを選択:
- "bullets": 箇条書き（一般的な情報・説明）
- "numbered": 番号付きステップ（手順・プロセス・優先順位）
- "two_column": 2カラム（比較・対比・Before/After）
- "highlight": 重要数字・KPI強調（数値・実績・目標）
- "problem": 課題・リスク提示（問題点・懸念事項）
- "action": アクションリスト（ToDo・担当者・次のステップ）

ルール:
- 目安枚数: ${slideCount}枚（タイトル含む）
- トーン: ${toneDesc}
- pointsは各スライド2〜5項目
- layout="two_column"の場合はpointsを偶数個にする（左右に振り分ける）
- layout="highlight"の場合はpointsの最初の要素を大きく強調する数値や短いフレーズにする
- 見出しは15文字以内
- 各ポイントは40文字以内
- 日本語で出力
- JSONのみ返す（説明文不要）`;

  const userPrompt = `以下の会議の文字起こしからスライドを作成してください:\n\n${transcript}`;

  try {
    setProgress(30);
    setStatus('loading', '<div class="spinner"></div>', 'Claude AIが文字起こしを分析中...');

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    setProgress(70);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `APIエラー: ${response.status}`);
    }

    const data = await response.json();
    const rawText = data.content?.[0]?.text || '';

    // JSON抽出
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('スライド構成の解析に失敗しました。');

    generatedSlides = JSON.parse(jsonMatch[0]);

    setProgress(90);
    setStatus('loading', '<div class="spinner"></div>', 'PowerPointファイルを生成中...');

    // プレビュー表示
    renderPreview(generatedSlides);

    setProgress(100);
    setTimeout(() => {
      setProgress(null);
      setStatus('success', '✓', `<strong>${generatedSlides.slides.length}枚のスライド</strong>が生成されました。下のボタンからダウンロードできます。`);
      document.getElementById('downloadBtn').className = 'download-btn show';
    }, 400);

  } catch (err) {
    setProgress(null);
    setStatus('error', '✕', `エラーが発生しました：${err.message}`);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">✦</span> スライドを自動生成する';
  }
}

// ─── プレビューレンダリング ───────────────────────
function renderPreview(data) {
  const list = document.getElementById('slideList');
  list.innerHTML = '';
  data.slides.forEach((slide, i) => {
    const item = document.createElement('div');
    item.className = 'slide-item';
    const points = (slide.points || []).map(p => `・${p}`).join('<br>');
    item.innerHTML = `
      <div class="slide-num">${i + 1}</div>
      <div class="slide-content">
        <div class="slide-heading">${slide.heading || slide.type}</div>
        <div class="slide-points">${points}</div>
      </div>
    `;
    list.appendChild(item);
  });
  document.getElementById('previewSection').className = 'preview-section show';
}

// ─── PPTXダウンロード ─────────────────────────────
async function downloadPptx() {
  if (!generatedSlides) return;

  const btn = document.getElementById('downloadBtn');
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;

  try {
    const pres = new PptxGenJS();
    pres.layout = 'LAYOUT_16x9';
    pres.title = generatedSlides.title || 'プレゼンテーション';

    const C = {
      dark:    '1A1F2E',
      accent:  '2563EB',
      accent2: '1E40AF',
      white:   'FFFFFF',
      gray1:   'F7F8FA',
      gray2:   'E2E6EA',
      muted:   '6B7280',
      text:    '1A1F2E',
      red:     'DC2626',
      red2:    'FEF2F2',
      green:   '059669',
      green2:  'ECFDF5',
      orange:  'D97706',
      orange2: 'FFFBEB',
      teal:    '0D9488',
      teal2:   'F0FDFA',
    };

    // 共通ヘッダー描画
    function drawHeader(slide, heading, idx, total, color) {
      slide.addShape(pres.ShapeType.rect, {
        x: 0, y: 0, w: 10, h: 0.95,
        fill: { color: color || C.dark }, line: { color: color || C.dark }
      });
      slide.addText(heading || '', {
        x: 0.45, y: 0, w: 8.6, h: 0.95,
        fontSize: 20, bold: true, color: C.white,
        fontFace: 'Calibri', valign: 'middle', margin: 0
      });
      slide.addText(`${idx + 1} / ${total}`, {
        x: 8.8, y: 0, w: 1.0, h: 0.95,
        fontSize: 10, color: 'A0AEC0',
        fontFace: 'Calibri', align: 'right', valign: 'middle', margin: 0
      });
    }

    const slides = generatedSlides.slides;

    slides.forEach((slideData, idx) => {
      const slide = pres.addSlide();
      const isTitle   = slideData.type === 'title' || idx === 0;
      const isSummary = slideData.type === 'summary';
      const layout    = slideData.layout || 'bullets';
      const pts       = slideData.points || [];

      // ════════════════════════════════
      // タイトルスライド
      // ════════════════════════════════
      if (isTitle) {
        slide.background = { color: C.dark };

        // 右側アクセントブロック
        slide.addShape(pres.ShapeType.rect, {
          x: 7.2, y: 0, w: 2.8, h: 5.625,
          fill: { color: C.accent }, line: { color: C.accent }
        });
        // 斜めライン風の小さな矩形
        slide.addShape(pres.ShapeType.rect, {
          x: 6.9, y: 0, w: 0.18, h: 5.625,
          fill: { color: '3B82F6' }, line: { color: '3B82F6' }
        });

        slide.addText(generatedSlides.title || 'プレゼンテーション', {
          x: 0.6, y: 1.5, w: 6.2, h: 1.6,
          fontSize: 30, bold: true, color: C.white,
          fontFace: 'Calibri', valign: 'middle', margin: 0
        });
        slide.addText(generatedSlides.subtitle || '', {
          x: 0.6, y: 3.2, w: 6.2, h: 0.6,
          fontSize: 13, color: '93C5FD',
          fontFace: 'Calibri', margin: 0
        });
        slide.addText(`全${slides.length}枚`, {
          x: 0.6, y: 4.9, w: 3, h: 0.4,
          fontSize: 10, color: '4B5563', fontFace: 'Calibri', margin: 0
        });

      // ════════════════════════════════
      // まとめスライド
      // ════════════════════════════════
      } else if (isSummary) {
        slide.background = { color: C.gray1 };
        drawHeader(slide, slideData.heading || 'まとめ', idx, slides.length, C.teal);

        const cols = pts.length <= 3 ? 1 : 2;
        const perCol = Math.ceil(pts.length / cols);
        const colW = cols === 1 ? 9.0 : 4.3;

        pts.forEach((pt, i) => {
          const col = cols === 2 ? Math.floor(i / perCol) : 0;
          const row = i % perCol;
          const x = 0.5 + col * 4.8;
          const y = 1.1 + row * 1.2;

          slide.addShape(pres.ShapeType.roundRect, {
            x, y, w: colW, h: 1.0,
            fill: { color: C.white },
            line: { color: C.teal },
            shadow: { type: 'outer', color: '000000', blur: 6, offset: 2, angle: 90, opacity: 0.08 },
            rectRadius: 0.1
          });
          // 左側カラーバー代わりの丸
          slide.addShape(pres.ShapeType.ellipse, {
            x: x + 0.18, y: y + 0.35, w: 0.3, h: 0.3,
            fill: { color: C.teal }, line: { color: C.teal }
          });
          slide.addText(pt, {
            x: x + 0.6, y, w: colW - 0.7, h: 1.0,
            fontSize: 12, color: C.text, fontFace: 'Calibri',
            valign: 'middle', margin: 0
          });
        });

      // ════════════════════════════════
      // 番号付きステップ (numbered)
      // ════════════════════════════════
      } else if (layout === 'numbered') {
        slide.background = { color: C.white };
        drawHeader(slide, slideData.heading, idx, slides.length, C.accent2);

        const cardH = pts.length <= 3 ? 1.1 : 0.82;
        const gap = 0.1;
        pts.forEach((pt, i) => {
          const y = 1.1 + i * (cardH + gap);
          slide.addShape(pres.ShapeType.roundRect, {
            x: 0.5, y, w: 9.0, h: cardH,
            fill: { color: C.gray1 }, line: { color: C.gray2 },
            rectRadius: 0.1
          });
          // 番号バッジ
          slide.addShape(pres.ShapeType.ellipse, {
            x: 0.65, y: y + cardH/2 - 0.25, w: 0.5, h: 0.5,
            fill: { color: C.accent2 }, line: { color: C.accent2 }
          });
          slide.addText(String(i + 1), {
            x: 0.65, y: y + cardH/2 - 0.25, w: 0.5, h: 0.5,
            fontSize: 13, bold: true, color: C.white,
            fontFace: 'Calibri', align: 'center', valign: 'middle', margin: 0
          });
          slide.addText(pt, {
            x: 1.35, y, w: 7.9, h: cardH,
            fontSize: pts.length <= 3 ? 14 : 12, color: C.text,
            fontFace: 'Calibri', valign: 'middle', margin: 0
          });
        });

      // ════════════════════════════════
      // 2カラム比較 (two_column)
      // ════════════════════════════════
      } else if (layout === 'two_column') {
        slide.background = { color: C.white };
        drawHeader(slide, slideData.heading, idx, slides.length, C.dark);

        const half = Math.ceil(pts.length / 2);
        const left  = pts.slice(0, half);
        const right = pts.slice(half);

        // 左ヘッダー
        slide.addShape(pres.ShapeType.roundRect, {
          x: 0.4, y: 1.05, w: 4.3, h: 0.45,
          fill: { color: C.accent }, line: { color: C.accent }, rectRadius: 0.06
        });
        slide.addText('ポイントA', {
          x: 0.4, y: 1.05, w: 4.3, h: 0.45,
          fontSize: 11, bold: true, color: C.white,
          fontFace: 'Calibri', align: 'center', valign: 'middle', margin: 0
        });

        // 右ヘッダー
        slide.addShape(pres.ShapeType.roundRect, {
          x: 5.3, y: 1.05, w: 4.3, h: 0.45,
          fill: { color: C.teal }, line: { color: C.teal }, rectRadius: 0.06
        });
        slide.addText('ポイントB', {
          x: 5.3, y: 1.05, w: 4.3, h: 0.45,
          fontSize: 11, bold: true, color: C.white,
          fontFace: 'Calibri', align: 'center', valign: 'middle', margin: 0
        });

        // 中央区切り線
        slide.addShape(pres.ShapeType.rect, {
          x: 4.9, y: 1.05, w: 0.2, h: 4.3,
          fill: { color: C.gray2 }, line: { color: C.gray2 }
        });

        const rowH = 0.75;
        left.forEach((pt, i) => {
          const y = 1.65 + i * (rowH + 0.1);
          slide.addShape(pres.ShapeType.roundRect, {
            x: 0.4, y, w: 4.3, h: rowH,
            fill: { color: 'EFF6FF' }, line: { color: 'BFDBFE' }, rectRadius: 0.07
          });
          slide.addText(pt, {
            x: 0.6, y, w: 4.0, h: rowH,
            fontSize: 12, color: C.text, fontFace: 'Calibri',
            valign: 'middle', margin: 0
          });
        });
        right.forEach((pt, i) => {
          const y = 1.65 + i * (rowH + 0.1);
          slide.addShape(pres.ShapeType.roundRect, {
            x: 5.3, y, w: 4.3, h: rowH,
            fill: { color: C.teal2 }, line: { color: '99F6E4' }, rectRadius: 0.07
          });
          slide.addText(pt, {
            x: 5.5, y, w: 4.0, h: rowH,
            fontSize: 12, color: C.text, fontFace: 'Calibri',
            valign: 'middle', margin: 0
          });
        });

      // ════════════════════════════════
      // 数字・KPI強調 (highlight)
      // ════════════════════════════════
      } else if (layout === 'highlight') {
        slide.background = { color: C.dark };
        drawHeader(slide, slideData.heading, idx, slides.length, '0F172A');

        // メイン数字・キーワード（1つ目のポイント）
        slide.addShape(pres.ShapeType.roundRect, {
          x: 2.5, y: 1.1, w: 5.0, h: 1.8,
          fill: { color: C.accent }, line: { color: C.accent }, rectRadius: 0.15
        });
        slide.addText(pts[0] || '', {
          x: 2.5, y: 1.1, w: 5.0, h: 1.8,
          fontSize: 38, bold: true, color: C.white,
          fontFace: 'Calibri', align: 'center', valign: 'middle', margin: 0
        });

        // サポートポイント（2つ目以降）
        const rest = pts.slice(1);
        const colW2 = rest.length > 0 ? (9.0 / rest.length) - 0.1 : 9.0;
        rest.forEach((pt, i) => {
          const x = 0.5 + i * (colW2 + 0.1);
          slide.addShape(pres.ShapeType.roundRect, {
            x, y: 3.2, w: colW2, h: 1.9,
            fill: { color: '1E293B' }, line: { color: '334155' }, rectRadius: 0.1
          });
          slide.addShape(pres.ShapeType.ellipse, {
            x: x + colW2/2 - 0.12, y: 3.35, w: 0.24, h: 0.24,
            fill: { color: '93C5FD' }, line: { color: '93C5FD' }
          });
          slide.addText(pt, {
            x: x + 0.15, y: 3.65, w: colW2 - 0.3, h: 1.3,
            fontSize: 11, color: 'CBD5E1', fontFace: 'Calibri',
            align: 'center', valign: 'top', margin: 0
          });
        });

      // ════════════════════════════════
      // 課題・リスク (problem)
      // ════════════════════════════════
      } else if (layout === 'problem') {
        slide.background = { color: C.white };
        drawHeader(slide, slideData.heading, idx, slides.length, C.red);

        const cardH2 = pts.length <= 3 ? 1.1 : 0.82;
        const gap2 = 0.1;
        pts.forEach((pt, i) => {
          const y = 1.1 + i * (cardH2 + gap2);
          slide.addShape(pres.ShapeType.roundRect, {
            x: 0.5, y, w: 9.0, h: cardH2,
            fill: { color: C.red2 }, line: { color: 'FECACA' }, rectRadius: 0.1
          });
          // 警告アイコン代わりの三角
          slide.addShape(pres.ShapeType.ellipse, {
            x: 0.68, y: y + cardH2/2 - 0.2, w: 0.4, h: 0.4,
            fill: { color: C.red }, line: { color: C.red }
          });
          slide.addText('!', {
            x: 0.68, y: y + cardH2/2 - 0.2, w: 0.4, h: 0.4,
            fontSize: 14, bold: true, color: C.white,
            fontFace: 'Calibri', align: 'center', valign: 'middle', margin: 0
          });
          slide.addText(pt, {
            x: 1.25, y, w: 8.0, h: cardH2,
            fontSize: pts.length <= 3 ? 14 : 12, color: '7F1D1D',
            fontFace: 'Calibri', valign: 'middle', margin: 0
          });
        });

      // ════════════════════════════════
      // アクションリスト (action)
      // ════════════════════════════════
      } else if (layout === 'action') {
        slide.background = { color: C.white };
        drawHeader(slide, slideData.heading, idx, slides.length, C.green);

        const cardH3 = pts.length <= 3 ? 1.1 : 0.82;
        const gap3 = 0.1;
        pts.forEach((pt, i) => {
          const y = 1.1 + i * (cardH3 + gap3);
          slide.addShape(pres.ShapeType.roundRect, {
            x: 0.5, y, w: 9.0, h: cardH3,
            fill: { color: C.green2 }, line: { color: '6EE7B7' }, rectRadius: 0.1
          });
          // チェックボックス風
          slide.addShape(pres.ShapeType.roundRect, {
            x: 0.65, y: y + cardH3/2 - 0.2, w: 0.4, h: 0.4,
            fill: { color: C.green }, line: { color: C.green }, rectRadius: 0.04
          });
          slide.addText('→', {
            x: 0.65, y: y + cardH3/2 - 0.2, w: 0.4, h: 0.4,
            fontSize: 14, bold: true, color: C.white,
            fontFace: 'Calibri', align: 'center', valign: 'middle', margin: 0
          });
          slide.addText(pt, {
            x: 1.25, y, w: 8.0, h: cardH3,
            fontSize: pts.length <= 3 ? 14 : 12, color: '064E3B',
            fontFace: 'Calibri', valign: 'middle', margin: 0
          });
        });

      // ════════════════════════════════
      // 通常箇条書き (bullets / default)
      // ════════════════════════════════
      } else {
        slide.background = { color: C.white };
        drawHeader(slide, slideData.heading, idx, slides.length, C.accent);

        const cardH4 = pts.length <= 3 ? 1.1 : 0.82;
        const gap4 = 0.1;
        pts.forEach((pt, i) => {
          const y = 1.1 + i * (cardH4 + gap4);
          slide.addShape(pres.ShapeType.roundRect, {
            x: 0.5, y, w: 9.0, h: cardH4,
            fill: { color: C.gray1 }, line: { color: C.gray2 },
            shadow: { type: 'outer', color: '000000', blur: 4, offset: 1, angle: 90, opacity: 0.05 },
            rectRadius: 0.1
          });
          slide.addShape(pres.ShapeType.ellipse, {
            x: 0.78, y: y + cardH4/2 - 0.1, w: 0.2, h: 0.2,
            fill: { color: C.accent }, line: { color: C.accent }
          });
          slide.addText(pt, {
            x: 1.15, y, w: 8.1, h: cardH4,
            fontSize: pts.length <= 3 ? 14 : 12, color: C.text,
            fontFace: 'Calibri', valign: 'middle', margin: 0
          });
        });
      }

      if (slideData.note) slide.addNotes(slideData.note);
    });

    const date = new Date().toLocaleDateString('ja-JP').replace(/\//g, '');
    await pres.writeFile({ fileName: `slides_${date}.pptx` });

  } catch (err) {
    alert('PowerPointの生成に失敗しました: ' + err.message);
    console.error(err);
  } finally {
    btn.textContent = '⬇ PowerPointをダウンロード (.pptx)';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
