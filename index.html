<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スライドジェネレーター v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0F1117;
  --surface:#1A1D27;
  --border:#2A2D3E;
  --ink:#F0F2FF;
  --muted:#8B92B3;
  --accent:#6366F1;
  --accent2:#818CF8;
  --success:#10B981;
  --danger:#F43F5E;
  --radius:14px;
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── ヘッダー ── */
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  height:58px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.logo-dot{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.badge{font-size:11px;padding:3px 10px;background:rgba(99,102,241,0.15);color:var(--accent2);border-radius:20px;border:1px solid rgba(99,102,241,0.3)}

/* ── メイン ── */
main{flex:1;max-width:860px;width:100%;margin:0 auto;padding:36px 24px 80px;display:flex;flex-direction:column;gap:24px}

/* ── カード ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px}
.card-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* ── 入力 ── */
.api-row{display:flex;gap:8px}
.api-input{
  flex:1;height:42px;border:1px solid var(--border);border-radius:9px;
  padding:0 14px;font-size:13px;font-family:'Courier New',monospace;
  color:var(--ink);background:#0F1117;outline:none;transition:border-color .15s;
}
.api-input:focus{border-color:var(--accent)}
.toggle-btn{
  height:42px;padding:0 14px;border:1px solid var(--border);border-radius:9px;
  background:transparent;cursor:pointer;font-size:12px;color:var(--muted);white-space:nowrap;transition:all .15s;
}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent2)}

.transcript-area{
  width:100%;min-height:200px;border:1px solid var(--border);border-radius:9px;
  padding:14px;font-size:13px;line-height:1.8;font-family:'Noto Sans JP',sans-serif;
  color:var(--ink);resize:vertical;outline:none;transition:border-color .15s;background:#0F1117;
}
.transcript-area:focus{border-color:var(--accent)}
.transcript-area::placeholder{color:#3A3D52}
.char-count{text-align:right;font-size:11px;color:var(--muted);margin-top:6px}

.options-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.option-group label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:5px}
.option-select{
  width:100%;height:38px;border:1px solid var(--border);border-radius:9px;
  padding:0 12px;font-size:12px;color:var(--ink);background:#0F1117;outline:none;cursor:pointer;
}

/* ── ボタン ── */
.generate-btn{
  width:100%;height:50px;background:var(--accent);color:white;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .15s,transform .1s;font-family:'Noto Sans JP',sans-serif;
}
.generate-btn:hover:not(:disabled){background:#4F46E5}
.generate-btn:disabled{background:#3730A3;opacity:0.6;cursor:not-allowed}

/* ── ステータス ── */
.status-box{display:none;border-radius:10px;padding:14px 18px;font-size:13px;align-items:center;gap:12px}
.status-box.show{display:flex}
.status-box.loading{background:rgba(99,102,241,0.1);color:var(--accent2);border:1px solid rgba(99,102,241,0.2)}
.status-box.success{background:rgba(16,185,129,0.1);color:var(--success);border:1px solid rgba(16,185,129,0.2)}
.status-box.error{background:rgba(244,63,94,0.1);color:var(--danger);border:1px solid rgba(244,63,94,0.2)}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

.progress-wrap{display:none;background:var(--border);border-radius:99px;height:3px;overflow:hidden}
.progress-wrap.show{display:block}
.progress-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;width:0%}

/* ── アクションボタン群 ── */
.action-btns{display:none;gap:12px}
.action-btns.show{display:flex}
.btn-present{
  flex:1;height:50px;background:var(--accent);color:white;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s;font-family:'Noto Sans JP',sans-serif;
}
.btn-present:hover{background:#4F46E5}
.btn-pdf{
  flex:1;height:50px;background:transparent;color:var(--success);
  border:1px solid var(--success);border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;font-family:'Noto Sans JP',sans-serif;
}
.btn-pdf:hover{background:rgba(16,185,129,0.1)}

/* ══════════════════════════════════════════
   プレゼンビューアー（モーダル）
══════════════════════════════════════════ */
#presenter{
  display:none;position:fixed;inset:0;background:#000;z-index:1000;
  flex-direction:column;
}
#presenter.open{display:flex}

.presenter-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:#111;border-bottom:1px solid #222;flex-shrink:0;
}
.presenter-title{font-size:13px;color:#888}
.presenter-controls{display:flex;align-items:center;gap:12px}
.ctrl-btn{
  width:36px;height:36px;border:1px solid #333;border-radius:8px;background:transparent;
  color:#aaa;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.ctrl-btn:hover{background:#222;color:white;border-color:#555}
.slide-counter{font-size:13px;color:#666;min-width:60px;text-align:center}

.slide-viewport{
  flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;
  padding:20px;background:#0a0a0a;
}

#slideFrame{
  width:100%;max-width:1200px;
  aspect-ratio:16/9;
  border:none;border-radius:8px;
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
  background:white;
}

.presenter-footer{
  display:flex;justify-content:center;gap:6px;padding:12px;
  background:#111;border-top:1px solid #222;flex-shrink:0;flex-wrap:wrap;
}
.thumb-btn{
  width:10px;height:10px;border-radius:50%;background:#333;border:none;cursor:pointer;
  transition:background .15s,transform .15s;
}
.thumb-btn.active{background:var(--accent);transform:scale(1.3)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot">✦</div>
    スライドジェネレーター v2
  </div>
  <span class="badge">HTML Slides</span>
</header>

<main>

  <div class="card">
    <div class="card-label">API設定</div>
    <div class="api-row">
      <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
      <button class="toggle-btn" onclick="toggleApi()">表示</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:7px">APIキーはブラウザ内のみ使用。外部送信なし（Anthropic API除く）</div>
  </div>

  <div class="card">
    <div class="card-label">会議の文字起こし</div>
    <textarea class="transcript-area" id="transcript" oninput="updateCount()"
      placeholder="ここに会議の文字起こしを貼り付けてください。

例：
山田：今期の売上は前年比120%、特に関西エリアの伸びが顕著です。
佐藤：新規顧客獲得が主因で、製造業向けの提案が効いています。
山田：来期は関東にも同様のアプローチを展開したいと思います。
..."></textarea>
    <div class="char-count"><span id="charCount">0</span> 文字</div>
    <div class="options-row">
      <div class="option-group">
        <label>スライド枚数</label>
        <select class="option-select" id="slideCount">
          <option value="5" selected>5枚（簡潔）</option>
          <option value="8">8枚（標準）</option>
          <option value="12">12枚（詳細）</option>
        </select>
      </div>
      <div class="option-group">
        <label>デザインテーマ</label>
        <select class="option-select" id="theme">
          <option value="dark">ダーク（モダン）</option>
          <option value="light">ライト（清潔感）</option>
          <option value="bold">ボールド（インパクト）</option>
        </select>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generate()">
    ✦ スライドを生成する
  </button>

  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status-box" id="statusBox"><div class="spinner" id="statusIcon" style="display:none"></div><div id="statusText"></div></div>

  <div class="action-btns" id="actionBtns">
    <button class="btn-present" onclick="openPresenter()">▶ プレゼン開始</button>
    <button class="btn-pdf" onclick="downloadPdf()">⬇ PDFで保存</button>
  </div>

</main>

<!-- プレゼンビューアー -->
<div id="presenter">
  <div class="presenter-header">
    <div class="presenter-title" id="presenterTitle">スライド</div>
    <div class="presenter-controls">
      <button class="ctrl-btn" onclick="prevSlide()">←</button>
      <div class="slide-counter" id="slideCounter">1 / 1</div>
      <button class="ctrl-btn" onclick="nextSlide()">→</button>
      <button class="ctrl-btn" onclick="closePresenter()" style="margin-left:8px;color:#f43f5e">✕</button>
    </div>
  </div>
  <div class="slide-viewport">
    <iframe id="slideFrame"></iframe>
  </div>
  <div class="presenter-footer" id="thumbBar"></div>
</div>

<script>
// ── グローバル ──────────────────────────────────
let slidesHtml = [];
let currentSlide = 0;
let apiVisible = false;

function toggleApi(){
  const i=document.getElementById('apiKey');
  const b=event.target;
  apiVisible=!apiVisible;
  i.type=apiVisible?'text':'password';
  b.textContent=apiVisible?'隠す':'表示';
}
function updateCount(){
  document.getElementById('charCount').textContent=
    document.getElementById('transcript').value.length.toLocaleString();
}
function setProgress(p){
  const w=document.getElementById('progressWrap');
  const b=document.getElementById('progressBar');
  if(p===null){w.classList.remove('show');b.style.width='0%'}
  else{w.classList.add('show');b.style.width=p+'%'}
}
function setStatus(type,text,spin=false){
  const box=document.getElementById('statusBox');
  const icon=document.getElementById('statusIcon');
  box.className='status-box show '+type;
  icon.style.display=spin?'block':'none';
  document.getElementById('statusText').innerHTML=text;
}
function clearStatus(){document.getElementById('statusBox').className='status-box'}

// ── メイン生成 ──────────────────────────────────
async function generate(){
  const apiKey=document.getElementById('apiKey').value.trim();
  const transcript=document.getElementById('transcript').value.trim();
  const slideCount=document.getElementById('slideCount').value;
  const theme=document.getElementById('theme').value;

  if(!apiKey){setStatus('error','APIキーを入力してください');return}
  if(transcript.length<50){setStatus('error','文字起こしを貼り付けてください（50文字以上）');return}

  const btn=document.getElementById('generateBtn');
  btn.disabled=true;btn.textContent='生成中...';
  document.getElementById('actionBtns').className='action-btns';
  clearStatus();setProgress(10);

  const themes={
    dark:{
      bg:'#0F1117',surface:'#1A1D27',text:'#F0F2FF',muted:'#8B92B3',
      accent:'#6366F1',accent2:'#818CF8',border:'#2A2D3E',
      titleBg:'linear-gradient(135deg,#1A1D27 0%,#0F1117 100%)',
      headerBg:'#6366F1',cardBg:'rgba(255,255,255,0.04)',cardBorder:'rgba(255,255,255,0.08)',
      highlight:'#F59E0B',danger:'#F43F5E',success:'#10B981'
    },
    light:{
      bg:'#FAFBFF',surface:'#FFFFFF',text:'#1A1D27',muted:'#6B7280',
      accent:'#4F46E5',accent2:'#6366F1',border:'#E5E7EB',
      titleBg:'linear-gradient(135deg,#EEF2FF 0%,#F0F9FF 100%)',
      headerBg:'#4F46E5',cardBg:'#F9FAFB',cardBorder:'#E5E7EB',
      highlight:'#D97706',danger:'#DC2626',success:'#059669'
    },
    bold:{
      bg:'#18181B',surface:'#27272A',text:'#FAFAFA',muted:'#A1A1AA',
      accent:'#F59E0B',accent2:'#FCD34D',border:'#3F3F46',
      titleBg:'linear-gradient(135deg,#27272A 0%,#18181B 100%)',
      headerBg:'#F59E0B',cardBg:'rgba(255,255,255,0.05)',cardBorder:'rgba(255,255,255,0.1)',
      highlight:'#6366F1',danger:'#F43F5E',success:'#10B981'
    }
  };
  const T=themes[theme];

  const systemPrompt=`あなたはプレゼンデザイナーです。会議の文字起こしを分析し、各スライドをHTML+CSSで出力します。

## 出力形式（JSONのみ）
[
  {"id":1,"title":"タイトル","html":"<HTMLコード>"},
  ...
]

## HTMLスライドのルール
- 1280×720px固定（style="width:1280px;height:720px;overflow:hidden;position:relative"）
- フォント: <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');*{font-family:"Noto Sans JP",sans-serif}</style>
- スライドごとにレイアウトを変える（タイトル/2カラム/数字強調/カードグリッド/まとめ）
- 背景色: ${T.bg}、テキスト: ${T.text}、アクセント: ${T.accent}
- 見出し48px、本文20px、余白60px、スライド番号を右下に表示
- 1スライド3〜4ポイントまで

## 構成（${slideCount}枚）
- 1枚目: タイトルスライド
- 最後: まとめ
- 中間: 多様なレイアウト

JSONのみ返す。`;

  try{
    setProgress(20);
    setStatus('loading','Claude AIが文字起こしを分析中...',true);

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:8000,
        system:systemPrompt,
        messages:[{role:'user',content:`以下の会議の文字起こしからスライドを作成してください:\n\n${transcript}`}]
      })
    });

    setProgress(70);

    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      throw new Error(e.error?.message||`APIエラー: ${res.status}`);
    }

    const data=await res.json();
    const raw=data.content?.[0]?.text||'';

    setProgress(85);
    setStatus('loading','スライドを構築中...',true);

    // JSON抽出
    const match=raw.match(/\[[\s\S]*\]/);
    if(!match)throw new Error('スライドデータの解析に失敗しました。');

    const parsed=JSON.parse(match[0]);
    slidesHtml=parsed;
    currentSlide=0;

    setProgress(100);
    setTimeout(()=>{
      setProgress(null);
      setStatus('success',`✓ <strong>${slidesHtml.length}枚</strong>のスライドが生成されました`);
      document.getElementById('actionBtns').className='action-btns show';
    },300);

  }catch(e){
    setProgress(null);
    setStatus('error',`エラー：${e.message}`);
    console.error(e);
  }finally{
    btn.disabled=false;btn.textContent='✦ スライドを生成する';
  }
}

// ── プレゼンター ────────────────────────────────
function buildThumbBar(){
  const bar=document.getElementById('thumbBar');
  bar.innerHTML='';
  slidesHtml.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='thumb-btn'+(i===currentSlide?' active':'');
    b.onclick=()=>goTo(i);
    bar.appendChild(b);
  });
}

function showSlide(idx){
  if(!slidesHtml.length)return;
  currentSlide=Math.max(0,Math.min(idx,slidesHtml.length-1));
  const frame=document.getElementById('slideFrame');
  const slide=slidesHtml[currentSlide];

  // iframeにHTMLを書き込む
  const doc=frame.contentDocument||frame.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>*{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:720px;overflow:hidden}</style>
  </head><body>${slide.html}</body></html>`);
  doc.close();

  document.getElementById('slideCounter').textContent=`${currentSlide+1} / ${slidesHtml.length}`;
  document.getElementById('presenterTitle').textContent=slide.title||'';

  // サムネイル更新
  document.querySelectorAll('.thumb-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===currentSlide);
  });
}

function openPresenter(){
  if(!slidesHtml.length)return;
  document.getElementById('presenter').classList.add('open');
  buildThumbBar();
  showSlide(0);
  // キーボード操作
  document.addEventListener('keydown',onKey);
}
function closePresenter(){
  document.getElementById('presenter').classList.remove('open');
  document.removeEventListener('keydown',onKey);
}
function onKey(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ')nextSlide();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevSlide();
  if(e.key==='Escape')closePresenter();
}
function nextSlide(){showSlide(currentSlide+1)}
function prevSlide(){showSlide(currentSlide-1)}
function goTo(idx){showSlide(idx)}

// ── PDFダウンロード ────────────────────────────
function downloadPdf(){
  if(!slidesHtml.length)return;

  const allHtml=slidesHtml.map((s,i)=>`
    <div class="slide-page">
      <div class="slide-inner">${s.html}</div>
    </div>
  `).join('');

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}

    /* A4横向き 297×210mm */
    @page{
      size: A4 landscape;
      margin: 0;
    }

    html,body{
      margin:0;padding:0;
      background:#fff;
    }

    .slide-page{
      width:297mm;
      height:210mm;
      overflow:hidden;
      page-break-after:always;
      page-break-inside:avoid;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
    }

    .slide-page:last-child{
      page-break-after:auto;
    }

    /* 1280×720を297mm×210mmにスケール */
    .slide-inner{
      width:1280px;
      height:720px;
      transform-origin:top left;
      transform:scale(calc(297mm / 1280px));
      /* JSでscaleを動的に設定 */
      position:absolute;
      top:0;left:0;
    }

    @media print{
      *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
      .slide-page{page-break-after:always}
    }
  </style>
  </head><body>${allHtml}
  <script>
    // 297mm = 1122px（96dpi）、210mm = 794px として計算
    window.onload=()=>{
      const pages=document.querySelectorAll('.slide-page');
      pages.forEach(page=>{
        const inner=page.querySelector('.slide-inner');
        const pw=page.offsetWidth;
        const ph=page.offsetHeight;
        const scaleX=pw/1280;
        const scaleY=ph/720;
        const scale=Math.min(scaleX,scaleY);
        inner.style.transform='scale('+scale+')';
        inner.style.transformOrigin='top left';
        // センタリング
        const offsetX=(pw-1280*scale)/2;
        const offsetY=(ph-720*scale)/2;
        inner.style.left=offsetX+'px';
        inner.style.top=offsetY+'px';
      });
      setTimeout(()=>window.print(),800);
    };
  <\/script>
  </body></html>`);
  win.document.close();
}
</script>
</body>
</html>
